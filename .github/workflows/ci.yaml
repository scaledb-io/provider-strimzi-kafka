---
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR when a new commit arrives.
# On main we let runs queue so every commit is validated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Compile directly — `make build` runs generation which is checked by the
      # verify job; we only want to know the code compiles here.
      - name: Compile binary
        run: go build -o /dev/null ./cmd/provider

  verify:
    name: Verify generated files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated files are up-to-date
        run: make verify

  copyright:
    name: Copyright headers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only meaningful on PRs — push to main is already vetted.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check copyright headers on changed files
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM \
            "origin/${{ github.base_ref }}"...HEAD \
            | grep -E '\.(go|ts|tsx)$' || true)

          if [[ -z "$FILES" ]]; then
            echo "No source files changed — skipping copyright check."
            exit 0
          fi

          echo "Checking:"
          echo "$FILES"

          echo "$FILES" | xargs python3 hack/add_copyright.py || true

          if ! git diff --quiet; then
            echo ""
            echo "::error::Missing copyright headers. Run the following and commit:"
            echo "  python3 hack/add_copyright.py <changed-files>"
            echo ""
            git diff
            exit 1
          fi

          echo "All copyright headers are present."

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint charts/provider-clickhouse
