apiVersion: v2
name: provider-strimzi-kafka
description: A Helm chart for deploying the OpenEverest provider-strimzi-kafka provider
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - openeverest
  - provider
  - database
home: https://github.com/openeverest/provider-strimzi-kafka
sources:
  - https://github.com/openeverest/provider-strimzi-kafka
maintainers:
  - name: OpenEverest Contributors
# The provider owns the operator lifecycle: the Strimzi Kafka operator ships as a
# bundled subchart (alias "operator") so the provider installs out of the box and
# customers do not have to install the operator separately. Resolved at install
# time via `helm dependency update` (Tilt/CI run this automatically).
dependencies:
  - name: strimzi-kafka-operator
    alias: operator
    version: "1.0.0"
    repository: https://strimzi.io/charts/
